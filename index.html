<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>약품 검색</title>
<style>
:root{--bg:#f6f7f9;--card:#fff;--tx:#1a1d21;--sub:#697079;--line:#e4e7eb;--pri:#2f6df6;--pri2:#e8f0ff;--warn:#c0392b}
@media(prefers-color-scheme:dark){:root{--bg:#0f1216;--card:#181c22;--tx:#e8eaed;--sub:#98a0aa;--line:#272c34;--pri:#4d86ff;--pri2:#17233d;--warn:#ff6b5e}}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--tx);-webkit-text-size-adjust:100%}
header{position:sticky;top:0;background:var(--bg);padding:12px 14px 8px;border-bottom:1px solid var(--line);z-index:10}
h1{font-size:18px;margin:0 0 10px}
.tabs{display:flex;gap:6px;margin-bottom:8px}
.tab{flex:1;padding:9px;border:1px solid var(--line);background:var(--card);color:var(--sub);border-radius:10px;font-size:14px;font-weight:600;text-align:center;cursor:pointer}
.tab.on{background:var(--pri);color:#fff;border-color:var(--pri)}
input,select{font-size:16px;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--tx);width:100%}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 8px}
.chip{padding:7px 11px;border:1px solid var(--line);background:var(--card);color:var(--tx);border-radius:20px;font-size:13px;cursor:pointer}
.chip.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn{padding:11px;background:var(--pri);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;width:100%;cursor:pointer}
main{padding:12px 14px 40px}
.cnt{font-size:13px;color:var(--sub);margin:4px 2px 10px}
.card{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px;cursor:pointer}
.card img{width:56px;height:56px;object-fit:contain;background:#fff;border-radius:8px;flex:none}
.card .nm{font-size:15px;font-weight:600;line-height:1.35}
.card .meta{font-size:12.5px;color:var(--sub);margin-top:3px;line-height:1.5}
.badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:6px;margin-right:5px;font-weight:600}
.b-etc{background:#fdecec;color:#c0392b}.b-otc{background:#e7f6ec;color:#1e8e4e}
@media(prefers-color-scheme:dark){.b-etc{background:#3a1e1e;color:#ff8073}.b-otc{background:#16311f;color:#5fd085}}
.more{padding:12px;text-align:center;color:var(--pri);font-weight:600;cursor:pointer}
.empty{text-align:center;color:var(--sub);padding:40px 0;font-size:14px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:50;align-items:flex-end}
.ov.on{display:flex}
.sheet{background:var(--bg);width:100%;max-height:90vh;overflow:auto;border-radius:16px 16px 0 0;padding:16px 16px 40px}
.sheet h2{font-size:19px;margin:0 6px 2px}
.sheet .en{color:var(--sub);font-size:13px;margin:0 6px 12px}
.sec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.sec h3{font-size:13px;color:var(--pri);margin:0 0 6px;font-weight:700}
.sec .t{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.sheet img.pill{width:120px;height:120px;object-fit:contain;background:#fff;border-radius:10px;display:block;margin:0 auto 10px}
.x{position:sticky;top:0;float:right;font-size:22px;color:var(--sub);cursor:pointer;padding:0 6px}
.note{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5}
.ld{text-align:center;padding:30px;color:var(--sub)}
</style>
</head>
<body>
<header>
<h1>💊 약품 검색</h1>
<div class="tabs">
<div class="tab on" id="tabName" onclick="setMode('name')">이름·성분</div>
<div class="tab" id="tabPill" onclick="setMode('pill')">모양</div>
</div>
<div id="paneName">
<input id="q" type="search" placeholder="약 이름 또는 성분 (예: 타이레놀, 아세트아미노펜)" oninput="onType()" autocomplete="off">
</div>
<div id="panePill" style="display:none">
<div class="chips" id="colors"></div>
<div class="row">
<select id="shape"><option value="">모양 전체</option></select>
<input id="imp" placeholder="각인/표시 (예: GR)" style="flex:1" oninput="deb(runPill)">
</div>
<button class="btn" onclick="runPill()">모양으로 검색</button>
</div>
</header>
<main>
<div class="cnt" id="cnt"></div>
<div id="list"></div>
<div id="more"></div>
</main>

<div class="ov" id="ov" onclick="if(event.target.id=='ov')closeSheet()">
<div class="sheet"><span class="x" onclick="closeSheet()">✕</span><div id="detail"></div></div>
</div>

<script>
var IDX=[], mode='name', shown=0, cur=[], PAGE=60;
var COLORS=['하양','노랑','분홍','주황','빨강','갈색','연두','초록','파랑','보라','회색','검정','투명'];
var SHAPES=['원형','타원형','장방형','삼각형','사각형','오각형','육각형','팔각형','마름모형','반원형','기타'];
var selColors={}, dt=null;

fetch('index.json').then(r=>r.json()).then(d=>{IDX=d;initFilters();document.getElementById('cnt').textContent=d.length.toLocaleString()+'개 의약품 · 이름이나 성분을 입력하세요';}).catch(e=>{document.getElementById('cnt').textContent='데이터 로드 실패';});

function initFilters(){
  var c=document.getElementById('colors');
  COLORS.forEach(col=>{var el=document.createElement('div');el.className='chip';el.textContent=col;el.onclick=function(){selColors[col]=!selColors[col];el.classList.toggle('on');deb(runPill);};c.appendChild(el);});
  var s=document.getElementById('shape');
  SHAPES.forEach(sh=>{var o=document.createElement('option');o.value=sh;o.textContent=sh;s.appendChild(o);});
  s.onchange=runPill;
}
function setMode(m){mode=m;
  document.getElementById('tabName').classList.toggle('on',m=='name');
  document.getElementById('tabPill').classList.toggle('on',m=='pill');
  document.getElementById('paneName').style.display=m=='name'?'':'none';
  document.getElementById('panePill').style.display=m=='pill'?'':'none';
  document.getElementById('list').innerHTML='';document.getElementById('more').innerHTML='';
  document.getElementById('cnt').textContent = m=='pill'?'색·모양·각인으로 좁혀보세요':IDX.length.toLocaleString()+'개 의약품';
}
function deb(fn){clearTimeout(dt);dt=setTimeout(fn,250);}
function onType(){deb(runName);}
function runName(){
  var q=document.getElementById('q').value.trim().toLowerCase();
  if(!q){cur=[];render();document.getElementById('cnt').textContent=IDX.length.toLocaleString()+'개 의약품';return;}
  var starts=[],incl=[];
  for(var i=0;i<IDX.length;i++){var r=IDX[i];
    var hay=(r.n+' '+(r.e||'')+' '+(r.s||'')).toLowerCase();
    var p=hay.indexOf(q); if(p<0)continue;
    (r.n.toLowerCase().indexOf(q)==0?starts:incl).push(r);
  }
  cur=starts.concat(incl);render();
}
function runPill(){
  var cols=Object.keys(selColors).filter(k=>selColors[k]);
  var sh=document.getElementById('shape').value;
  var imp=document.getElementById('imp').value.trim().toLowerCase();
  if(!cols.length&&!sh&&!imp){cur=[];render();document.getElementById('cnt').textContent='색·모양·각인으로 좁혀보세요';return;}
  cur=IDX.filter(r=>{
    if(!r.img&&!r.col&&!r.sh)return false;
    if(sh&&r.sh!=sh)return false;
    if(cols.length){if(!r.col)return false;if(!cols.every(c=>r.col.indexOf(c)>=0))return false;}
    if(imp){if(!r.im||r.im.toLowerCase().indexOf(imp)<0)return false;}
    return true;
  });
  render();
}
function render(){
  shown=0;document.getElementById('list').innerHTML='';
  document.getElementById('cnt').textContent=cur.length?cur.length.toLocaleString()+'개 결과':'';
  if(!cur.length){document.getElementById('list').innerHTML='<div class="empty">결과가 없어요</div>';document.getElementById('more').innerHTML='';return;}
  page();
}
function page(){
  var list=document.getElementById('list');var end=Math.min(shown+PAGE,cur.length);
  var html='';
  for(var i=shown;i<end;i++){var r=cur[i];
    var badge=r.g?'<span class="badge b-etc">전문</span>':'<span class="badge b-otc">일반</span>';
    var meta=[r.s||'',r.c||''].filter(Boolean).join(' · ');
    var thumb=(mode=='pill'&&r.img)?'<img loading="lazy" src="'+r.img+'">':'';
    html+='<div class="card" onclick="openD(\''+r.i+'\','+r.d+')">'+thumb+'<div><div class="nm">'+esc(r.n)+'</div><div class="meta">'+badge+esc(meta)+'</div></div></div>';
  }
  list.insertAdjacentHTML('beforeend',html);shown=end;
  document.getElementById('more').innerHTML = shown<cur.length?'<div class="more" onclick="page()">더보기 ('+(cur.length-shown).toLocaleString()+')</div>':'';
}
var shardCache={};
function openD(id,sh){
  var ov=document.getElementById('ov'),det=document.getElementById('detail');
  det.innerHTML='<div class="ld">불러오는 중…</div>';ov.classList.add('on');document.body.style.overflow='hidden';
  var go=function(data){renderD(id,data[id]);};
  if(shardCache[sh])return go(shardCache[sh]);
  fetch('d/'+sh+'.json').then(r=>r.json()).then(d=>{shardCache[sh]=d;go(d);}).catch(e=>{det.innerHTML='<div class="ld">상세 로드 실패</div>';});
}
function sec(title,txt){if(!txt)return '';return '<div class="sec"><h3>'+title+'</h3><div class="t">'+esc(txt)+'</div></div>';}
function renderD(id,d){
  var det=document.getElementById('detail');
  if(!d){det.innerHTML='정보 없음';return;}
  var idx=IDX.find(r=>r.i==id)||{};
  var badge=idx.g?'<span class="badge b-etc">전문</span>':'<span class="badge b-otc">일반</span>';
  var h='<h2>'+badge+esc(idx.n||'')+'</h2>';
  if(idx.e)h+='<div class="en">'+esc(idx.e)+'</div>';
  if(idx.img)h+='<img class="pill" src="'+idx.img+'">';
  var e=d['e약은요']||{};
  h+=sec('효능', e['효능']||d['효능효과']);
  h+=sec('용법·용량', e['용법']||d['용법용량']);
  h+=sec('이상반응(부작용)', e['부작용']);
  h+=sec('함께 주의할 약·음식', e['상호작용']);
  h+=sec('주의사항', e['주의']||d['주의사항']);
  h+=sec('보관', e['보관']||d['저장방법']);
  var s=d['성분']||{};
  h+=sec('성분', [s['주성분'],s['영문']].filter(Boolean).join('\n'));
  var info=[];
  if(d['마약류'])info.push('마약류: '+d['마약류']);
  if(d['ATC'])info.push('ATC: '+d['ATC']);
  if(d['성상'])info.push('성상: '+d['성상']);
  if(d['업체'])info.push('업체: '+d['업체']);
  h+=sec('기타', info.join('\n'));
  h+='<div class="note">ℹ️ 참고용 · 최종 판단은 처방·원내 지침을 따릅니다. 병용금기 등 DUR은 Obsidian 성분 노트를 함께 확인하세요.<br>출처: 식약처 공공데이터</div>';
  det.innerHTML=h;det.parentNode.scrollTop=0;
}
function closeSheet(){document.getElementById('ov').classList.remove('on');document.body.style.overflow='';}
function esc(s){return (s==null?'':''+s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
</script>
</body>
</html>
